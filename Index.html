<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heroic Call Log Viewer</title>
    <style>
        :root {
            --primary: #00a884;
            --secondary: #128c7e;
            --bg: #0b141a; 
            --card-bg: rgba(31, 44, 51, 0.9); /* Translucent for Marvel BG */
            --text-main: #e9edef;
            --text-sub: #8696a0;
            --incoming: #00dfa2;
            --outgoing: #34b7f1;
            --missed: #ff5e5e;
            /* Marvel Colors for Flair */
            --hulk-green: #4caf50;
            --groot-brown: #a1887f;
            --loki-gold: #ffd700;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--text-main);
            overflow-x: hidden;
            /* Macha! Marvel Background Watermark - Darkened for readability */
            background-image: 
                linear-gradient(rgba(11, 20, 26, 0.93), rgba(11, 20, 26, 0.98)),
                url('https://i.imgur.com/uRj0p6C.png'); /* Custom Comics Style Image (Hulk, Groot, Loki) */
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        /* Animated Header */
        .header {
            background: linear-gradient(180deg, var(--secondary) 0%, rgba(11, 20, 26, 0.3) 100%);
            padding: 50px 20px 30px;
            text-align: center;
            border-bottom: 2px solid rgba(0, 168, 132, 0.2);
        }

        .header h1 { margin: 0; font-size: 32px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .header p { color: var(--hulk-green); font-weight: 700; margin-top: 5px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        /* Modern Upload Section */
        .upload-wrapper {
            padding: 0 20px;
            margin-top: -30px;
            max-width: 500px;
            margin-left: auto; margin-right: auto;
        }

        .upload-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
            border: 1px solid rgba(0, 168, 132, 0.3);
            backdrop-filter: blur(10px); /* Glassmorphism */
        }

        .file-label {
            display: block;
            border: 2px dashed var(--primary);
            padding: 40px 20px;
            border-radius: 20px;
            cursor: pointer;
            background: rgba(0, 168, 132, 0.03);
            transition: all 0.3s ease;
        }

        .file-label:hover { border-color: var(--hulk-green); background: rgba(76, 175, 80, 0.05); transform: translateY(-3px); }

        #fetchingStatus {
            display: none;
            margin-top: 20px;
            font-weight: bold;
            text-align: center;
            color: var(--hulk-green);
            font-size: 15px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* List Styling */
        .log-container { padding: 20px 15px 40px; max-width: 650px; margin: auto; }

        .call-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
            backdrop-filter: blur(5px);
            opacity: 0;
            transform: translateY(25px);
            animation: heroSlideIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            transition: all 0.3s ease;
        }

        .call-card:hover { transform: scale(1.02); box-shadow: 0 10px 25px rgba(0, 168, 132, 0.2); border-color: rgba(0, 168, 132, 0.2); }

        @keyframes heroSlideIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .card-top { display: flex; align-items: center; justify-content: space-between; }
        
        .contact-info { display: flex; align-items: center; }
        .avatar {
            width: 55px; height: 55px;
            background: linear-gradient(135deg, var(--hulk-green), var(--secondary));
            border-radius: 16px; /* Squircle */
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 900; color: white; margin-right: 18px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        /* Hulk Smash style avatar sometimes */
        .call-card:nth-child(3n) .avatar { background: linear-gradient(135deg, var(--loki-gold), #b8860b); color: #000; }
        .call-card:nth-child(5n) .avatar { background: linear-gradient(135deg, #8d6e63, #5d4037); } /* Groot brown */

        .details-text { display: flex; flex-direction: column; }
        .contact-name { font-size: 19px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
        .phone-num { font-size: 14px; color: var(--text-sub); margin-top: 3px; font-family: monospace; }

        .call-type-chip {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex; align-items: center; gap: 5px;
        }

        .type-1 .call-type-chip { background: rgba(0, 223, 162, 0.12); color: var(--incoming); border: 1px solid rgba(0, 223, 162, 0.2); }
        .type-2 .call-type-chip { background: rgba(52, 183, 241, 0.12); color: var(--outgoing); border: 1px solid rgba(52, 183, 241, 0.2); }
        .type-3 .call-type-chip { background: rgba(255, 94, 94, 0.12); color: var(--missed); border: 1px solid rgba(255, 94, 94, 0.2); }

        .card-bottom {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 13px;
            color: var(--text-sub);
        }

        .duration-tag { background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 10px; color: #fff; font-size: 11px; font-weight: bold; border: 1px solid rgba(255,255,255,0.03); }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

<div class="header" id="mainHeader">
    <h1>Heroic Call Logs</h1>
    <p id="totalDisplay">Unga backup-ah upload pannunga</p>
</div>

<div class="upload-wrapper" id="uploadWrapper">
    <div class="upload-box">
        <label class="file-label">
            <input type="file" id="fileInput" accept=".xml" style="display:none;">
            <div style="font-size: 50px; margin-bottom: 15px;">🛡️</div>
            <div style="font-weight: 900; font-size: 18px; text-transform: uppercase; color: #fff;">Assemble Logs</div>
            <div style="font-size: 12px; color: var(--text-sub); margin-top: 5px;">Select SyncTech XML File</div>
        </label>
        <div id="fetchingStatus">🔄 Fetching 10,000+ Heroic Logs...</div>
    </div>
</div>

<div id="logList" class="log-container"></div>

<script>
    const fileInput = document.getElementById('fileInput');
    const logList = document.getElementById('logList');
    const fetchingStatus = document.getElementById('fetchingStatus');
    const uploadWrapper = document.getElementById('uploadWrapper');
    const mainHeader = document.getElementById('mainHeader');
    const totalDisplay = document.getElementById('totalDisplay');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // UI Transformation
        fetchingStatus.style.display = "block";
        logList.innerHTML = "";
        
        const reader = new FileReader();
        reader.onload = function(event) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(event.target.result, "text/xml");
            const callNodes = Array.from(xmlDoc.getElementsByTagName("call"));

            const data = callNodes.map(node => ({
                name: node.getAttribute("contact_name") || "Unknown Hero",
                num: node.getAttribute("number") || "No ID",
                date: parseInt(node.getAttribute("date")),
                rDate: node.getAttribute("readable_date"),
                dur: parseInt(node.getAttribute("duration")),
                type: node.getAttribute("type")
            })).sort((a, b) => b.date - a.date);

            // Transition UI
            uploadWrapper.style.display = "none";
            mainHeader.style.padding = "25px";
            totalDisplay.innerText = `${data.length} Heroic Logs Assembled`;
            totalDisplay.style.color = "var(--loki-gold)";
            
            let index = 0;
            const chunkSize = 75;

            function renderChunk() {
                const end = Math.min(index + chunkSize, data.length);
                let fragment = "";

                for (let i = index; i < end; i++) {
                    const c = data[i];
                    const firstLetter = c.name.charAt(0).toUpperCase();
                    const typeLabel = c.type === "1" ? "Incoming" : (c.type === "2" ? "Outgoing" : "Missed");
                    const icon = c.type === "1" ? "↙" : (c.type === "2" ? "↗" : "✕");
                    const duration = c.dur >= 60 ? Math.floor(c.dur/60) + "m " + (c.dur%60) + "s" : c.dur + "s";

                    fragment += `
                        <div class="call-card type-${c.type}">
                            <div class="card-top">
                                <div class="contact-info">
                                    <div class="avatar">${firstLetter}</div>
                                    <div class="details-text">
                                        <span class="contact-name">${c.name}</span>
                                        <span class="phone-num">${c.num}</span>
                                    </div>
                                </div>
                                <div class="call-type-chip"><span>${icon}</span> ${typeLabel}</div>
                            </div>
                            <div class="card-bottom">
                                <span>📅 ${c.rDate}</span>
                                <span class="duration-tag">⏱ ${duration}</span>
                            </div>
                        </div>`;
                }

                logList.insertAdjacentHTML('beforeend', fragment);
                index = end;

                if (index < data.length) {
                    requestAnimationFrame(renderChunk);
                } else {
                    fetchingStatus.style.display = "none";
                }
            }
            renderChunk();
        };
        reader.readAsText(file);
    });
</script>

</body>
</html>
